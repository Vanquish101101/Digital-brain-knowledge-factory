document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dge Base · v2.0\n  <\u002Fdiv>\n  <h1 class=\"u\" style=\"--d:.18s;margin:0;font-size:168px;line-height:.92;font-weight:600;letter-spacing:-.03em;\">Knowledge<br><span style=\"color:#3BE8A0;\">Factory<\u002Fspan><\u002Fh1>\n  <div class=\"ln\" style=\"--d:.5s;height:2px;width:560px;background:linear-gradient(90deg,#3BE8A0,transparent);margin:54px 0 40px;\"><\u002Fdiv>\n  <p class=\"u\" style=\"--d:.6s;margin:0;font-size:40px;font-weight:400;line-height:1.35;color:#A9BCB4;max-width:1100px;\">Инновационная база знаний для AI-агентов&nbsp;— <span style=\"color:#E7F1EC;font-weight:500;\">под ключ в Docker<\u002Fspan>.<\u002Fp>\n  <div class=\"f\" style=\"--d:.85s;margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;font-family:'JetBrains Mono',monospace;font-size:20px;color:#5C7068;\">\n    <div style=\"display:flex;gap:14px;\">\n      <span style=\"padding:10px 18px;border:1px solid rgba(59,232,160,.25);border-radius:6px;color:#8FE9C4;\">RAG<\u002Fspan>\n      <span style=\"padding:10px 18px;border:1px solid rgba(59,232,160,.25);border-radius:6px;color:#8FE9C4;\">+ Graph<\u002Fspan>\n      <span style=\"padding:10px 18px;border:1px solid rgba(59,232,160,.25);border-radius:6px;color:#8FE9C4;\">+ Memory<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"text-align:right;color:#7E938B;line-height:1.5;\">2026 · Георгий<br><span style=\"color:#5C7068;\">AI Department<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SLIDE 2 — WHY ============ -->\n<section data-label=\"Why\" data-screen-label=\"02\" data-speaker-notes=\"Зачем. Обычный RAG теряет связи. Нам нужны знания, которые связываются, помнят и обучаются. Решение — RAG + Graph + Memory.\" style=\"display:flex;flex-direction:column;justify-content:center;padding:96px 140px;background:#070C0A;color:#E7F1EC;font-family:'Space Grotesk',sans-serif;\">\n  <div class=\"x\" style=\"--d:.05s;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.3em;text-transform:uppercase;color:#3BE8A0;\">// motivation<\u002Fdiv>\n  <h2 class=\"u\" style=\"--d:.12s;margin:18px 0 64px;font-size:96px;font-weight:600;letter-spacing:-.02em;\">Зачем это нужно<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 64px 1fr 64px 1fr;align-items:stretch;gap:0;\">\n    <div class=\"u\" style=\"--d:.24s;padding:44px;border-radius:18px;background:rgba(255,90,90,.05);border:1px solid rgba(255,120,120,.22);\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.18em;color:#FF8A8A;text-transform:uppercase;\">проблема<\u002Fdiv>\n      <div style=\"margin-top:22px;font-size:40px;font-weight:600;line-height:1.18;\">Обычный RAG<br>теряет связи<\u002Fdiv>\n      <p style=\"margin:20px 0 0;font-size:24px;line-height:1.45;color:#9DB0A8;\">Плоский поиск по векторам не видит, как факты связаны между собой.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"f\" style=\"--d:.4s;display:flex;align-items:center;justify-content:center;font-size:44px;color:#3BE8A0;\">→<\u002Fdiv>\n    <div class=\"u\" style=\"--d:.46s;padding:44px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.18em;color:#A9BCB4;text-transform:uppercase;\">потребность<\u002Fdiv>\n      <div style=\"margin-top:22px;font-size:40px;font-weight:600;line-height:1.18;\">Знания, которые<br>живут<\u002Fdiv>\n      <ul style=\"margin:22px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:12px;font-size:24px;color:#C7D6CF;\">\n        <li>↳ связываются<\u002Fli><li>↳ помнят<\u002Fli><li>↳ обучаются<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"f\" style=\"--d:.62s;display:flex;align-items:center;justify-content:center;font-size:44px;color:#3BE8A0;\">→<\u002Fdiv>\n    <div class=\"s\" style=\"--d:.68s;padding:44px;border-radius:18px;background:radial-gradient(120% 120% at 50% 0%,rgba(59,232,16 s:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">Документы<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">нарезка<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">эмбеддинги<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">векторная БД<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">запрос<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">поиск по сходству<\u002Fspan><span style=\"color:#5C7068;align-self:center;\">→<\u002Fspan>\n        <span style=\"padding:8px 13px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);\">ответ<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;padding-top:26px;display:flex;flex-direction:column;gap:11px;font-size:21px;color:#FF9A9A;\">\n        <div>✗ не видит связи между фактами<\u002Fdiv>\n        <div>✗ мало контекста о проекте и агенте<\u002Fdiv>\n        <div>✗ один общий поиск на всех<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- RIGHT: Factory -->\n    <div class=\"s\" style=\"--d:.42s;padding:34px;border-radius:18px;background:radial-gradient(130% 120% at 50% 0%,rgba(59,232,160,.13),rgba(59,232,160,.03));border:1px solid rgba(59,232,160,.42);box-shadow:0 0 60px rgba(59,232,160,.1);display:flex;flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:.16em;color:#3BE8A0;text-transform:uppercase;\">фабрика · 4 хранилища + дирижёр<\u002Fdiv>\n      <div style=\"margin-top:18px;display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:17px;color:#9DB0A8;\">\n        Источники <span style=\"color:#3BE8A0;\">→<\u002Fspan> очистка <span style=\"color:#3BE8A0;\">→<\u002Fspan> разбивка + извлечение сущностей\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:11px;\">\n        <div style=\"padding:14px 16px;border-radius:10px;background:rgba(59,232,160,.07);border:1px solid rgba(59,232,160,.3);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3BE8A0;font-size:16px;\">1 ·<\u002Fspan> <span style=\"font-size:20px;font-weight:600;\">Векторное хранилище<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 16px;border-radius:10px;background:rgba(59,232,160,.07);border:1px solid rgba(59,232,160,.3);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3BE8A0;font-size:16px;\">2 ·<\u002Fspan> <span style=\"font-size:20px;font-weight:600;\">Граф связей · GraphRAG<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 16px;border-radius:10px;background:rgba(59,232,160,.07);border:1px solid rgba(59,232,160,.3);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3BE8A0;font-size:16px;\">3 ·<\u002Fspan> <span style=\"font-size:20px;font-weight:600;\">Метаданные · теги · ACL<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 16px;border-radius:10px;background:rgba(59,232,160,.07);border:1px solid rgba(59,232,160,.3);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3BE8A0;font-size:16px;\">4 ·<\u002Fspan> <span style=\"font-size:20px;font-weight:600;\">Память агент/проект/общая<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:rgba(59,232,160,.12);border:1px solid rgba(59,232,160,.45);font-size:20px;font-weight:600;color:#E7F1EC;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#3BE8A0;\">⎈<\u002Fspan> Оркестратор (Retriever) <span style=\"color:#3BE8A0;\">→<\u002Fspan> агенты: разработки · аналитики · безопасности · бизнеса\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;padding-top:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:#7E938B;\">↻ цикл: обновление · версия · обратная связь<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"f\" style=\"--d:.7s;margin-top:30px;display:flex;align-items:center;gap:18px;\">\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.1);font-size:19px;\">\n      <div style=\"padding:13px 18px;background:rgba(255,255,255,.03);\"><span style=\"color:#6E827A;font-family:'JetBrains Mono',monospace;font-size:14px;\">ХРАНЕНИЕ<\u002Fspan><br><span style=\"color:#FF9A9A;\">плоский список<\u002Fspan> · <span style=\"color:#8FE9C4;\">4 источника<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:13px 18px;background:rgba(255,255,255,.02);\"><span style=\"color:#6E827A;font-family:'JetBrains Mono',monospace;font-size:14px;\">ПОИСК<\u002Fspan><br><span style=\"color:#FF9A9A;\">по сходству<\u002Fspan> · <span style=\"color:#8FE9C4;\">+ связи + память<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:13px 18px;background:rgba(255,255,255,.03);\"><span style=\"color:#6E827A;font-family:'JetBrains Mono',monospace;font-size:14px;\">ДЛЯ АГЕНТОВ<\u002Fspan><br><span style=\"color:#FF9A9A;\">общий<\u002Fspan> · <span style=\"color:#8FE9C4;\">контекст агента<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:13px 18px;background:rgba(255,255,255,.02);\"><span style=\"color:#6E827A;font-family:'JetBrains Mono',monospace;font-size:14px;\">РЕЗУЛЬТАТ<\u002Fspan><br><span style=\"color:#FF9A9A;\">куски<\u002Fspan> · <span style=\"color:#8FE9C4;\">собранный ответ<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"f\" style=\"--d:.9s;margin:22px 0 0;font-size:23px;line-height:1.4;color:#A9BCB4;max-width:1500px;\">«Обычный RAG ищет похожие куски. <span style=\"color:#3BE8A0;\">Фабрика понимает связи, помнит контекст агента и собирает ответ из 4 источников сразу.<\u002Fspan>»<\u002Fp>\n<\u002Fsection>\n\n<!-- ============ SLIDE 2.5 — WHAT IS VECTOR STORAGE ============ -->\n<section data-label=\"Vector storage\" data-screen-label=\"04\" data-speaker-notes=\"Векторное хранилище — пространство со смыслом. Слово → точка, адрес точки = список координат = эмбеддинг. Поиск = найти ближайших соседей.\" style=\"display:flex;flex-direction:column;justify-content:center;padding:84px 110px;background:#070C0A;color:#E7F1EC;font-family:'Space Grotesk',sans-serif;\">\n  <div class=\"x\" style=\"--d:.05s;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.3em;text-transform:uppercase;color:#3BE8A0;\">// embedding space<\u002Fdiv>\n  <h2 class=\"u\" style=\"--d:.12s;margin:12px 0 6px;font-size:76px;font-weight:600;letter-spacing:-.02em;\">Что такое векторное хранилище<\u002Fh2>\n  <p class=\"u\" style=\"--d:.2s;margin:0 0 44px;font-size:30px;color:#A9BCB4;\">Пространство, где знания расположены по смыслу.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:center;\">\n    <!-- semantic space visual -->\n    <div class=\"s\" style=\"--d:.34s;position:relative;height:440px;border-radius:18px;background:radial-gradient(120% 120% at 30% 25%,rgba(59,232,160,.07),transparent 60%),#0A100D;border:1px solid rgba(255,255,255,.1);overflow:hidden;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:auto,46px 46px,46px 46px;\">\n      <
