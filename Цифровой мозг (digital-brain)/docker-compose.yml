
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kf-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${DATA_ROOT}/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    container_name: kf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # NTFS bind-mount (E:) не может отдать строгие Unix-права, которые требует Postgres,
      # ни для какой вложенной папки — используем именованный том Docker (см. README про PGDATA).
      - kf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: kf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${DATA_ROOT}/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kf-redis
    restart: unless-stopped
    ports:
      # host-порт 6380: 6379 занят чужим контейнером marketing-agency-redis (другой проект)
      - "6380:6379"
    volumes:
      - ${DATA_ROOT}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

# Kuzu (граф, LIGHT-профиль) — встроенная библиотека без JVM, не отдельный контейнер.
# Подключается напрямую из kf.py к файлу графа в ${DATA_ROOT}/graph — см. core.md.

volumes:
  kf_postgres_data:
    # Фиксированное имя тома — не зависит от имени папки/проекта (project name Docker Compose
    # берёт из текущей директории). Без этого переименование папки проекта создавало бы
    # каждый раз новый пустой том вместо переиспользования существующего с данными.
    name: knowledge-factory_kf_postgres_data
